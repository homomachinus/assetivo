<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }

    .container {
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    .word-wrapper {
      position: relative;
      display: grid;
      grid-template-areas: "stack";
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 10px 0; 
    }

    .word {
      grid-area: stack;
      font-size: clamp(2.5rem, 8vw, 5.5rem); 
      font-weight: 300;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(30px);
      transition:
        opacity 0.8s ease,
        transform 0.8s ease;
      white-space: nowrap;
    }

    .word.active {
      opacity: 1;
      transform: translateY(0);
    }

    .word.exit {
      opacity: 0;
      transform: translateY(-30px);
    }

    .sub {
      margin-top: 24px;
      font-size: 0.9rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .line {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 28px auto 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="word-wrapper">
      <div class="word active">Coming Soon</div>
    </div>



  </div>

  <script>
    const words = [
      "Coming Soon",  
      "Segera Hadir", 
      "Badhe Rampung",
      "Próximamente", 
      "Bientôt",      
      "間もなく",     
      "곧 공개",      
      "即将推出",     
      "Segera Hadir", 
      "Demnächst",    
      "In Arrivo",    
      "قريباً"         
    ];

    const wrapper = document.querySelector(".word-wrapper");
    let index = 0;

    function switchWord() {
      const current = document.querySelector(".word.active");
      
      current.classList.remove("active");
      current.classList.add("exit");

      setTimeout(() => {
        current.remove();

        index = (index + 1) % words.length;

        const next = document.createElement("div");
        next.className = "word";
        next.textContent = words[index];

        wrapper.appendChild(next);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            next.classList.add("active");
          });
        });
      }, 800);
    }

    setInterval(switchWord, 2000); 
  </script>
</body>
</html>
